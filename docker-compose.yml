services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql
    mem_limit: 1g
    memswap_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Generates YouTube PO tokens so yt-dlp survives «Sign in to confirm you're
  # not a bot» on datacenter IPs. The bgutil-ytdlp-pot-provider plugin inside
  # the bot fetches tokens from it automatically (src/pipeline/shorts.py).
  # `latest` is deliberate: the provider must track YouTube-side changes.
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    init: true
    mem_limit: 256m
    memswap_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # Self-hosted CPU image generation for the bot's life posts (src/life/).
  # The bot must start when imagegen is down — photo posts degrade to text.
  # Idles at ~300 MB (model unloaded); the 3g peak exists only around the
  # two weekly generations.
  imagegen:
    build: ./imagegen-service
    restart: unless-stopped
    mem_limit: 3g
    memswap_limit: 3g
    volumes:
      - sd-models:/models
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  bot:
    build: .
    image: games-chatbot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://chatbot:${POSTGRES_PASSWORD}@postgres:5432/chatbot
      IMAGEGEN_URL: http://imagegen:8000
      LOG_LEVEL: INFO
      # Container stdout is not a tty; force ANSI colors so `docker compose
      # logs` renders them in a terminal.
      LOG_COLOR: always
      ASYNCPG_LOG_LEVEL: WARNING
      TELEGRAM_APP_LOG_LEVEL: WARNING
      TELEGRAM_UPDATER_LOG_LEVEL: WARNING
    depends_on:
      postgres:
        condition: service_healthy
      # No health condition: the bot must start even when the sidecar is
      # down — Shorts summaries degrade to silence, everything else works.
      pot-provider:
        condition: service_started
      # Same: photo posts degrade to text stories when imagegen is down.
      imagegen:
        condition: service_started
    # 2g: CPU torch + the resident Silero TTS model do not fit in the old
    # 800m cap. Budget on the 8GB host: OS+Docker ~1.2g, postgres 1g,
    # pot-provider 256m, bot 2g, imagegen 3g peak — ~7.5g worst case, and
    # the imagegen peak only exists during the two weekly generations.
    mem_limit: 2g
    memswap_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg-data:
  sd-models:
