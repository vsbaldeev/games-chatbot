services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    image: games-chatbot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://chatbot:${POSTGRES_PASSWORD}@postgres:5432/chatbot
      LOG_LEVEL: INFO
      ASYNCPG_LOG_LEVEL: WARNING
      TELEGRAM_APP_LOG_LEVEL: WARNING
      TELEGRAM_UPDATER_LOG_LEVEL: WARNING
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 800m
    memswap_limit: 800m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg-data:
