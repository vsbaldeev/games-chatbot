# Alembic configuration.
#
# The database URL is not set here — it is resolved at runtime from
# ``src.config.SQLALCHEMY_DB_URL`` inside ``alembic/env.py`` so that the same
# ``DATABASE_URL`` environment variable drives both the bot and migrations.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Version scripts are grouped into per-release subdirectories (versions/v3, …),
# so Alembic must scan version_locations recursively to discover them.
recursive_version_locations = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
